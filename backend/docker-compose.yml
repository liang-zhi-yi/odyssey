# Odyssey MVP — PostgreSQL 16
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: odyssey-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: odyssey
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d odyssey"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    name: odyssey-pgdata
