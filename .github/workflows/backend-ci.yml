name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install fastapi>=0.115.0 uvicorn[standard]>=0.30.0 sqlalchemy>=2.0.30 \
            pydantic>=2.7.0 pydantic-settings>=2.3.0 "pydantic[email]>=2.7.0" \
            "python-jose[cryptography]>=3.3.0" bcrypt>=4.0.0 \
            openai>=1.40.0 httpx>=0.27.0 \
            python-multipart>=0.0.18 \
            pytest>=8.2.0 pytest-asyncio>=0.23.0
      - name: Run tests
        run: python -m pytest tests/ -v
