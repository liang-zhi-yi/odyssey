[build]
builder = "nixpacks"
buildCommand = "pip install fastapi>=0.115.0 uvicorn[standard]>=0.30.0 sqlalchemy>=2.0.30 alembic>=1.13.0 psycopg2-binary>=2.9.9 pydantic>=2.7.0 pydantic-settings>=2.3.0 'pydantic[email]>=2.7.0' 'python-jose[cryptography]>=3.3.0' bcrypt>=4.0.0 openai>=1.40.0 httpx>=0.27.0"

[deploy]
startCommand = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/v1/health"

[service]
name = "odyssey-api"
